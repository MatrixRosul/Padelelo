version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: padelelo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: padelelo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: padelelo_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  postgres_data:
